apiVersion: apps/v1
kind: Deployment
metadata:
  name: logging-deployment
  namespace: logging-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logger
  template:
    metadata:
      labels:
        app: logger
    spec:
      volumes:
      - name: shared-logs
        emptyDir: {}
      containers:
      - name: app-container
        image: busybox
        command:
        - sh
        - -c
        - "while true; do echo 'Log entry' >> /var/log/app/app.log; sleep 5; done"
        volumeMounts:
          - name: shared-logs
            mountPath: /var/log/app
      - name: log-agent
        image: busybox
        volumeMounts:
         - name: shared-logs
           mountPath: /var/log/app
        command:
         - sh
         - -c
         - "tail -f /var/log/app/app.log"
~                                       
