# Create a new user called john. Grant him access to the cluster using a csr named john-developer. Create a role developer which should grant John the permission to create, list, get, update and delete pods in the development namespace . 
# The private key exists in the location: /root/CKA/john.key and csr at /root/CKA/john.csr.
# Important Note: As of kubernetes 1.19, the CertificateSigningRequest object expects a signerName.

apiVersion: certificates.k8s.io/v1
kind: CertificateSigningRequest
metadata:
  name: john-developer # example
  namespace: developer
spec:
  # This is an encoded CSR. Change this to the base64-encoded contents of myuser.csr
  request: 
  signerName: kubernetes.io/kube-apiserver-client
  usages:
  - client auth
  - digital signature

# k certificate approve john-developer
  ---
apiVersion: rbac.authorization.k8s.io/v1
# This role binding allows "jane" to read pods in the "default" namespace.
# You need to already have a Role named "pod-reader" in that namespace.
kind: RoleBinding
metadata:
  name: john-rolebinding
  namespace: development
subjects:
# You can specify more than one "subject"
- kind: User
  name: john # "name" is case sensitive
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role #this must be Role or ClusterRole
  name: developer # this must match the name of the Role or ClusterRole you wish to bind to
  apiGroup: rbac.authorization.k8s.io
                                                                             